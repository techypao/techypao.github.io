<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolMate | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login">
    <div class="login-bg-illustration"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="logo"><span class="logo-sol">Sol</span><span class="logo-mate">Mate</span></h1>
            <h2 class="login-title">Login</h2>
            <div class="login-divider"></div>
            <form id="loginForm" novalidate>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="login-row">
                    <div></div>
                    <p class="forgot"><a href="#">Forgot Password?</a></p>
                </div>
                <button type="submit" class="btn login-btn">Log In</button>
            </form>
            <!-- Google login removed -->
            <p class="signup-text">Don't Have an Account? <a href="register.html">Register Here</a></p>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
